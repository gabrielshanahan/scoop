name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: scoop
          POSTGRES_PASSWORD: scoop
          POSTGRES_DB: scoop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build
        env:
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/scoop
          QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://localhost:5432/scoop
          QUARKUS_DATASOURCE_USERNAME: scoop
          QUARKUS_DATASOURCE_PASSWORD: scoop
          CI_TIMEOUT_MULTIPLIER: 3
        timeout-minutes: 10

      - name: Verify publishable artifacts
        run: ./gradlew publishToMavenLocal
        timeout-minutes: 5
